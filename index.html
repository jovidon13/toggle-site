<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status Toggle</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --on-glow: #22c55e;
        --off-glow: #ef4444;
        --bg: #0c0c0e;
        --surface: #131317;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0ede8;
        --muted: rgba(240, 237, 232, 0.45);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      .rings {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid;
        opacity: 0;
        animation: pulse-ring 4s ease-out infinite;
      }

      .ring:nth-child(1) {
        width: 200px;
        height: 200px;
        animation-delay: 0s;
      }
      .ring:nth-child(2) {
        width: 320px;
        height: 320px;
        animation-delay: 0.8s;
      }
      .ring:nth-child(3) {
        width: 440px;
        height: 440px;
        animation-delay: 1.6s;
      }

      @keyframes pulse-ring {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        20% {
          opacity: 0.15;
        }
        100% {
          opacity: 0;
          transform: scale(1.05);
        }
      }

      .topbar {
        position: fixed;
        top: 16px;
        right: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        z-index: 20;
      }

      .topbar a,
      .topbar button {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        padding: 8px 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .topbar a:hover,
      .topbar button:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .card {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: clamp(32px, 8vw, 52px) clamp(24px, 8vw, 60px);
        text-align: center;
        width: 100%;
        max-width: 440px;
        z-index: 10;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 28px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .login-title {
        font-family: "Syne", sans-serif;
        font-size: clamp(22px, 6vw, 28px);
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 8px;
      }

      .login-sub {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 32px;
        font-weight: 300;
      }

      .input-wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }

      .input-field {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 14px 18px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-field::placeholder {
        color: var(--muted);
      }
      .input-field:focus {
        border-color: rgba(255, 255, 255, 0.25);
      }

      .login-btn {
        width: 100%;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 14px;
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: background 0.3s;
        -webkit-tap-highlight-color: transparent;
      }

      .login-btn:hover {
        background: rgba(255, 255, 255, 0.13);
      }
      .login-btn:active {
        background: rgba(255, 255, 255, 0.06);
      }
      .login-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .login-error {
        font-size: 13px;
        color: var(--off-glow);
        margin-top: 12px;
        min-height: 18px;
        transition: opacity 0.3s;
      }

      .label-top {
        font-family: "Syne", sans-serif;
        font-size: clamp(10px, 2.5vw, 11px);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: clamp(28px, 6vw, 40px);
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
        position: relative;
        top: -1px;
        transition:
          background 0.4s,
          box-shadow 0.4s;
      }

      .toggle-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(24px, 6vw, 36px);
      }

      .status-text {
        font-family: "Syne", sans-serif;
        font-size: clamp(48px, 16vw, 72px);
        font-weight: 800;
        letter-spacing: -2px;
        line-height: 1;
        transition: color 0.4s;
      }

      .toggle-btn {
        position: relative;
        width: clamp(80px, 22vw, 96px);
        height: clamp(44px, 12vw, 52px);
        border-radius: 100px;
        border: none;
        cursor: pointer;
        background: transparent;
        padding: 0;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }
      .toggle-btn:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .toggle-track {
        width: 100%;
        height: 100%;
        border-radius: 100px;
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        transition:
          background 0.4s,
          border-color 0.4s;
        position: relative;
        overflow: hidden;
      }

      .toggle-thumb {
        position: absolute;
        top: 4px;
        left: 4px;
        width: calc(clamp(44px, 12vw, 52px) - 10px);
        height: calc(clamp(44px, 12vw, 52px) - 10px);
        border-radius: 50%;
        background: #fff;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          background 0.4s;
      }

      .toggle-btn.on .toggle-track {
        background: rgba(34, 197, 94, 0.18);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .toggle-btn.on .toggle-thumb {
        transform: translateX(
          calc(clamp(80px, 22vw, 96px) - clamp(44px, 12vw, 52px) + 2px)
        );
        background: var(--on-glow);
      }
      .toggle-btn.off .toggle-track {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .toggle-btn.off .toggle-thumb {
        background: var(--off-glow);
      }

      .status-text.on {
        color: var(--on-glow);
      }
      .status-text.off {
        color: var(--off-glow);
      }
      .status-indicator.on {
        background: var(--on-glow);
        box-shadow: 0 0 8px var(--on-glow);
      }
      .status-indicator.off {
        background: var(--off-glow);
        box-shadow: 0 0 8px var(--off-glow);
      }
      .ring.on {
        border-color: var(--on-glow);
      }
      .ring.off {
        border-color: var(--off-glow);
      }

      .feedback {
        font-size: clamp(12px, 3vw, 13px);
        color: var(--muted);
        min-height: 20px;
        margin-top: 4px;
        transition: color 0.3s;
        font-weight: 300;
      }

      .feedback.sending {
        color: var(--muted);
      }
      .feedback.sent-on {
        color: var(--on-glow);
      }
      .feedback.sent-off {
        color: var(--off-glow);
      }
      .feedback.error {
        color: #f97316;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: var(--border);
        margin: clamp(20px, 5vw, 28px) auto clamp(16px, 4vw, 24px);
      }

      .footer-text {
        font-size: clamp(11px, 2.8vw, 12px);
        color: var(--muted);
        font-weight: 300;
        letter-spacing: 0.02em;
      }

      .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
        font-weight: 300;
      }

      .hidden {
        display: none !important;
      }

      .shake {
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-8px);
        }
        40% {
          transform: translateX(8px);
        }
        60% {
          transform: translateX(-6px);
        }
        80% {
          transform: translateX(6px);
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <div class="rings">
      <div class="ring off"></div>
      <div class="ring off"></div>
      <div class="ring off"></div>
    </div>

    <div class="topbar hidden" id="topbar">
      <a href="/admin.html" id="adminLink" class="hidden">Админка</a>
      <button type="button" id="logoutBtn">Выйти</button>
    </div>

    <!-- LOGIN -->
    <div class="card hidden" id="loginCard">
      <div class="login-title">Вход</div>
      <div class="login-sub">введите логин и пароль</div>
      <div class="input-wrap">
        <input
          class="input-field"
          type="text"
          id="loginInput"
          placeholder="Логин"
          autocomplete="username"
        />
        <input
          class="input-field"
          type="password"
          id="passInput"
          placeholder="Пароль"
          autocomplete="current-password"
        />
      </div>
      <button class="login-btn" id="loginBtn" type="button">ВОЙТИ</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <!-- TOGGLE -->
    <div class="card hidden" id="toggleCard">
      <div class="label-top">
        <span class="status-indicator off" id="dot"></span>
        статус устройства
      </div>
      <div class="toggle-wrap">
        <div class="status-text off" id="statusText">OFF</div>
        <button class="toggle-btn off" id="toggleBtn" type="button">
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
        </button>
        <div class="feedback" id="feedback">нажмите для изменения статуса</div>
        <div class="meta" id="meta"></div>
      </div>
      <div class="divider"></div>
      <div class="footer-text">уведомление придёт в Telegram</div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      const loginCard = $("loginCard");
      const toggleCard = $("toggleCard");
      const topbar = $("topbar");
      const adminLink = $("adminLink");
      const loginBtn = $("loginBtn");
      const loginInput = $("loginInput");
      const passInput = $("passInput");
      const loginError = $("loginError");
      const toggleBtn = $("toggleBtn");
      const statusText = $("statusText");
      const dot = $("dot");
      const feedback = $("feedback");
      const meta = $("meta");
      const rings = document.querySelectorAll(".ring");

      let isOn = false;
      let isSending = false;

      function applyState(state) {
        isOn = !!state.isOn;
        const cls = isOn ? "on" : "off";
        toggleBtn.className = `toggle-btn ${cls}`;
        statusText.className = `status-text ${cls}`;
        statusText.textContent = isOn ? "ON" : "OFF";
        dot.className = `status-indicator ${cls}`;
        rings.forEach((r) => (r.className = `ring ${cls}`));

        if (state.lastChangedBy && state.lastChangedAt) {
          const time = new Date(state.lastChangedAt).toLocaleString("ru-RU", {
            timeZone: "Asia/Dushanbe",
          });
          meta.textContent = `последнее изменение: ${state.lastChangedBy} · ${time}`;
        } else {
          meta.textContent = "";
        }
      }

      function showLogin() {
        loginCard.classList.remove("hidden");
        toggleCard.classList.add("hidden");
        topbar.classList.add("hidden");
        loginInput.focus();
      }

      function showToggle(role) {
        loginCard.classList.add("hidden");
        toggleCard.classList.remove("hidden");
        topbar.classList.remove("hidden");
        adminLink.classList.toggle("hidden", role !== "admin");
      }

      async function fetchStatus() {
        try {
          const res = await fetch("/api/status", { credentials: "same-origin" });
          if (!res.ok) return;
          const state = await res.json();
          applyState(state);
        } catch {
          /* offline */
        }
      }

      async function init() {
        try {
          const res = await fetch("/api/me", { credentials: "same-origin" });
          const data = await res.json();
          if (data.authenticated) {
            showToggle(data.role);
            await fetchStatus();
            feedback.className = "feedback";
            feedback.textContent = "нажмите для изменения статуса";
          } else {
            showLogin();
          }
        } catch {
          showLogin();
          loginError.textContent = "нет связи с сервером";
        }
      }

      async function handleLogin() {
        const login = loginInput.value.trim();
        const password = passInput.value;
        loginError.textContent = "";

        if (!login || !password) {
          loginError.textContent = "введите логин и пароль";
          return;
        }

        loginBtn.disabled = true;
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ login, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            loginError.textContent = data.error || "ошибка входа";
            loginCard.classList.add("shake");
            loginCard.addEventListener(
              "animationend",
              () => loginCard.classList.remove("shake"),
              { once: true },
            );
            return;
          }
          passInput.value = "";
          showToggle(data.role);
          await fetchStatus();
          feedback.className = "feedback";
          feedback.textContent = "нажмите для изменения статуса";
        } catch {
          loginError.textContent = "ошибка сети";
        } finally {
          loginBtn.disabled = false;
        }
      }

      async function handleToggle() {
        if (isSending) return;
        isSending = true;
        toggleBtn.disabled = true;
        feedback.className = "feedback sending";
        feedback.textContent = "отправка уведомления...";

        try {
          const res = await fetch("/api/toggle", {
            method: "POST",
            credentials: "same-origin",
          });
          if (res.status === 401) {
            showLogin();
            return;
          }
          const data = await res.json();
          if (!res.ok) {
            feedback.className = "feedback error";
            feedback.textContent = data.error || "ошибка";
            return;
          }
          applyState(data);
          const statusStr = data.isOn ? "ON" : "OFF";
          if (data.telegramOk) {
            feedback.className = `feedback sent-${statusStr.toLowerCase()}`;
            feedback.textContent = `✓ уведомление отправлено — ${statusStr}`;
          } else {
            feedback.className = "feedback error";
            feedback.textContent = `статус сохранён, но Telegram недоступен`;
          }
        } catch {
          feedback.className = "feedback error";
          feedback.textContent = "⚠ ошибка сети";
        } finally {
          isSending = false;
          toggleBtn.disabled = false;
        }
      }

      async function handleLogout() {
        try {
          await fetch("/api/logout", {
            method: "POST",
            credentials: "same-origin",
          });
        } catch {
          /* ignore */
        }
        loginInput.value = "";
        passInput.value = "";
        loginError.textContent = "";
        showLogin();
      }

      loginBtn.addEventListener("click", handleLogin);
      toggleBtn.addEventListener("click", handleToggle);
      $("logoutBtn").addEventListener("click", handleLogout);

      passInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
      loginInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });

      document.addEventListener("visibilitychange", () => {
        if (
          document.visibilityState === "visible" &&
          !toggleCard.classList.contains("hidden")
        ) {
          fetchStatus();
        }
      });

      init();
    </script>
  </body>
</html>
